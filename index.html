<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Scanner</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <h2>Scanner de Documento</h2>

    <input
        type="file"
        id="fileInput"
        accept="image/*"
    >

    <br><br>

    <div id="canvasContainer">

        <canvas id="previewCanvas"></canvas>

    </div>

    <div class="buttons">

        <button id="btnAuto">
            Usar Corte Detectado
        </button>

        <button id="btnManual">
            Ajustar Manualmente
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
